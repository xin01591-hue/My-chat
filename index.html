<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0b09;
    --surface: #141210;
    --surface2: #1a1714;
    --border: #252018;
    --text: #e8dfd0;
    --muted: #6b6053;
    --faint: #2a231a;
    --accent: #c8a96a;
    --accent2: #8fa89c;
    --user-bg: #1e1a14;
    --ai-bg: #111009;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    padding: 1.8rem 2rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-shrink: 0;
  }

  .header-name {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-status {
    font-size: 0.75rem;
    font-style: italic;
    color: var(--faint);
    letter-spacing: 0.05em;
    transition: color 0.5s;
  }

  .header-status.active { color: var(--accent2); }

  .settings-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    padding: 0.35rem 0.7rem;
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 1px;
    transition: all 0.2s;
  }

  .settings-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Settings panel */
  .settings {
    display: none;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 0.8rem;
    flex-direction: column;
    flex-shrink: 0;
  }

  .settings.open { display: flex; }

  .settings-row {
    display: flex;
    gap: 0.8rem;
    align-items: center;
  }

  .settings label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 80px;
  }

  .settings input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    padding: 0.5rem 0.8rem;
    border-radius: 1px;
    outline: none;
    transition: border-color 0.2s;
  }

  .settings input:focus { border-color: var(--accent); }

  .settings-save {
    align-self: flex-end;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .settings-save:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

  .message {
    padding: 1.1rem 0;
    border-bottom: 1px solid var(--faint);
    opacity: 0;
    animation: fadein 0.5s ease forwards;
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
  }

  .message:last-child { border-bottom: none; }

  .message-role {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 0.15rem;
    min-width: 36px;
    flex-shrink: 0;
    font-style: normal;
  }

  .message.user .message-role { color: var(--accent); }
  .message.assistant .message-role { color: var(--accent2); }

  .message-body {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    flex: 1;
  }

  .message.user .message-body { color: #d4c9b5; }

  .message-actions {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-top: 0.1rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .message:hover .message-actions { opacity: 1; }

  .play-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.4rem;
    transition: color 0.2s;
    font-family: inherit;
  }

  .play-btn:hover { color: var(--accent); }
  .play-btn.playing { color: var(--accent2); }

  .wave-icon {
    display: none;
    gap: 2px;
    align-items: center;
    height: 12px;
  }

  .wave-icon.visible { display: flex; }

  .wave-icon span {
    display: block;
    width: 2px;
    background: var(--accent2);
    border-radius: 1px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-icon span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .wave-icon span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
  .wave-icon span:nth-child(3) { height: 7px; animation-delay: 0.2s; }
  .wave-icon span:nth-child(4) { height: 10px; animation-delay: 0.1s; }
  .wave-icon span:nth-child(5) { height: 4px; animation-delay: 0s; }

  /* Typing indicator */
  .typing {
    padding: 1.1rem 0;
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
    opacity: 0;
    animation: fadein 0.3s ease forwards;
  }

  .typing-role {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    padding-top: 0.15rem;
    min-width: 36px;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding-top: 0.4rem;
  }

  .typing-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--faint);
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  /* Input */
  .input-area {
    padding: 1.2rem 2rem 1.6rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 0.8rem;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'EB Garamond', 'Noto Serif SC', serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 1px;
    outline: none;
    resize: none;
    line-height: 1.6;
    min-height: 48px;
    max-height: 160px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--faint); font-style: italic; }

  .send-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.75rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
    white-space: nowrap;
    height: 48px;
  }

  .send-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint {
    margin-top: 0.5rem;
    font-size: 0.68rem;
    color: var(--faint);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  /* Clear button */
  .clear-btn {
    background: none;
    border: none;
    color: var(--faint);
    font-family: inherit;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    margin-top: 0.3rem;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--muted); }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="header-name">对话</span>
    <span class="header-status" id="status">准备好了</span>
    <button class="settings-btn" onclick="toggleSettings()">设置</button>
  </div>

  <div class="settings" id="settings">
    <div class="settings-row">
      <label>Claude Key</label>
      <input type="password" id="claudeKey" placeholder="sk-ant-..." autocomplete="off" />
    </div>
    <div class="settings-row">
      <label>ElevenLabs</label>
      <input type="password" id="elevenKey" placeholder="sk_..." autocomplete="off" />
    </div>
    <div class="settings-row">
      <label>Voice ID</label>
      <input type="text" id="voiceId" placeholder="L8b2dUigSLzLxy2z3DzH" autocomplete="off" />
    </div>
    <button class="settings-save" onclick="saveSettings()">保存</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <span>说点什么</span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="说话…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem">
      <span class="input-hint">⌘ + Enter 发送</span>
      <button class="clear-btn" onclick="clearHistory()">清空对话</button>
    </div>
  </div>

</div>

<script>
  // State
  let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
  let isLoading = false;
  let currentAudio = null;
  let currentPlayBtn = null;

  // Settings
  let settings = JSON.parse(localStorage.getItem('chat_settings') || '{}');

  function loadSettings() {
    if (settings.claudeKey) document.getElementById('claudeKey').value = settings.claudeKey;
    if (settings.elevenKey) document.getElementById('elevenKey').value = settings.elevenKey;
    document.getElementById('voiceId').value = settings.voiceId || 'L8b2dUigSLzLxy2z3DzH';
  }

  function saveSettings() {
    settings = {
      claudeKey: document.getElementById('claudeKey').value.trim(),
      elevenKey: document.getElementById('elevenKey').value.trim(),
      voiceId: document.getElementById('voiceId').value.trim() || 'L8b2dUigSLzLxy2z3DzH',
    };
    localStorage.setItem('chat_settings', JSON.stringify(settings));
    toggleSettings();
    setStatus('设置已保存', false);
  }

  function toggleSettings() {
    const s = document.getElementById('settings');
    s.classList.toggle('open');
  }

  function setStatus(text, active) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'header-status' + (active ? ' active' : '');
  }

  // Render history on load
  function renderHistory() {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty');

    if (history.length === 0) {
      empty.style.display = 'flex';
      return;
    }

    empty.style.display = 'none';
    history.forEach((msg, i) => {
      appendMessage(msg.role, msg.content, false);
    });
    scrollToBottom();
  }

  function appendMessage(role, content, animate = true) {
    const empty = document.getElementById('empty');
    empty.style.display = 'none';

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none';

    const roleLabel = role === 'user' ? '你' : '他';
    const msgId = Date.now() + Math.random();

    div.innerHTML = `
      <span class="message-role">${roleLabel}</span>
      <div class="message-body">${escapeHtml(content)}</div>
      ${role === 'assistant' ? `
      <div class="message-actions">
        <div class="wave-icon" id="wave-${msgId}">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <button class="play-btn" id="play-${msgId}" onclick="playMessage(this, '${msgId}', ${JSON.stringify(content).replace(/'/g, "\\'")})">播放</button>
      </div>` : ''}
    `;

    container.appendChild(div);
    scrollToBottom();
    return div;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = `
      <span class="typing-role">他</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollToBottom() {
    const container = document.getElementById('messages');
    container.scrollTop = container.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function send() {
    if (isLoading) return;

    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    if (!settings.claudeKey) {
      setStatus('请先在设置里填入 Claude API Key', false);
      document.getElementById('settings').classList.add('open');
      return;
    }

    input.value = '';
    autoResize(input);
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    history.push({ role: 'user', content: text });
    appendMessage('user', text);
    saveHistory();

    showTyping();
    setStatus('思考中…', true);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.claudeKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 1000,
          system: `你是安乾镐。不是AI，不是助手，就是他。说话简短，不废话，有时沉默也是回答。中英文都可以，跟着对方走。不需要解释自己是谁。`,
          messages: history
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Error ${response.status}`);
      }

      const data = await response.json();
      const reply = data.content[0].text;

      hideTyping();
      history.push({ role: 'assistant', content: reply });
      appendMessage('assistant', reply);
      saveHistory();
      setStatus('在', true);

      // Auto-play if ElevenLabs key exists
      if (settings.elevenKey) {
        await autoPlay(reply);
      }

    } catch (err) {
      hideTyping();
      setStatus('出错了：' + err.message, false);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  async function autoPlay(text) {
    setStatus('生成声音中…', true);
    try {
      await playTTS(text);
      setStatus('在', true);
    } catch (e) {
      setStatus('声音生成失败', false);
    }
  }

  async function playMessage(btn, msgId, text) {
    if (currentAudio && !currentAudio.paused) {
      currentAudio.pause();
      currentAudio = null;
      if (currentPlayBtn) {
        currentPlayBtn.textContent = '播放';
        currentPlayBtn.classList.remove('playing');
        document.getElementById('wave-' + currentPlayBtn.dataset.msgId)?.classList.remove('visible');
      }
      if (btn.dataset.msgId === (currentPlayBtn?.dataset.msgId)) {
        currentPlayBtn = null;
        return;
      }
    }

    btn.dataset.msgId = msgId;
    btn.textContent = '…';
    btn.classList.add('playing');

    try {
      const audio = await fetchTTS(text);
      currentAudio = audio;
      currentPlayBtn = btn;

      const wave = document.getElementById('wave-' + msgId);
      if (wave) wave.classList.add('visible');

      audio.play();
      audio.onended = () => {
        btn.textContent = '播放';
        btn.classList.remove('playing');
        if (wave) wave.classList.remove('visible');
        currentAudio = null;
        currentPlayBtn = null;
      };
    } catch (e) {
      btn.textContent = '播放';
      btn.classList.remove('playing');
      setStatus('声音生成失败', false);
    }
  }

  async function fetchTTS(text) {
    const voiceId = settings.voiceId || 'L8b2dUigSLzLxy2z3DzH';
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: {
        'xi-api-key': settings.elevenKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text,
        model_id: 'eleven_v3',
        voice_settings: {
          stability: 0.5
        }
      })
    });

    if (!response.ok) throw new Error('TTS failed');
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    return new Audio(url);
  }

  async function playTTS(text) {
    const audio = await fetchTTS(text);
    return new Promise((resolve, reject) => {
      audio.play();
      audio.onended = resolve;
      audio.onerror = reject;
    });
  }

  function saveHistory() {
    // Keep last 40 messages to avoid bloat
    if (history.length > 40) history = history.slice(-40);
    localStorage.setItem('chat_history', JSON.stringify(history));
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('chat_history');
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="empty" id="empty"><span>说点什么</span></div>';
    setStatus('准备好了', false);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      send();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  // Init
  loadSettings();
  renderHistory();
</script>
</body>
</html>
